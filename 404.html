<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>iRam — 404 Not Found</title>
  <link rel="icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><text y='.9em' font-size='90'>🪿</text></svg>">
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      background: #dceefa;
      font-family: 'Segoe UI', Arial, sans-serif;
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: flex-end;
      overflow: hidden;
    }

    /* ── Text block (sits above field) ── */
    .text-area {
      position: relative;
      z-index: 10;
      text-align: center;
      padding: 32px 20px 20px;
      width: 100%;
      background: linear-gradient(to bottom, #dceefa 70%, transparent);
    }
    .err-code {
      font-size: clamp(80px, 18vw, 120px);
      font-weight: 900;
      color: #2D2D2D;
      line-height: 1;
      letter-spacing: -5px;
    }
    .err-code span { color: #4e9938; }
    h1 {
      font-size: clamp(17px, 3.5vw, 22px);
      font-weight: 700;
      color: #2D2D2D;
      margin: 6px 0 5px;
    }
    .sub {
      font-size: 14px;
      color: #555;
      line-height: 1.55;
      margin-bottom: 18px;
    }
    .btn-home {
      display: inline-flex;
      align-items: center;
      gap: 7px;
      background: #4e9938;
      color: #fff;
      font-size: 14px;
      font-weight: 700;
      padding: 10px 24px;
      border-radius: 10px;
      text-decoration: none;
      transition: background .15s, transform .1s;
    }
    .btn-home:hover { background: #3d7828; transform: translateY(-1px); }

    /* ── Field wrapper ── */
    .field-wrapper {
      position: relative;
      width: 100%;
      max-width: 900px;
      flex-shrink: 0;
    }
    .field-wrapper svg.bg {
      display: block;
      width: 100%;
      height: auto;
    }

    /* ── Cloud drift ── */
    .c1 { animation: cdrift 30s ease-in-out infinite; }
    .c2 { animation: cdrift 22s ease-in-out infinite reverse; animation-delay:-8s; }
    @keyframes cdrift {
      0%,100% { transform: translateX(0); }
      50%      { transform: translateX(20px); }
    }

    /* ── Sign wobble ── */
    .sign { transform-box:fill-box; transform-origin:50% 100%; animation: swobble 5s ease-in-out infinite; }
    @keyframes swobble {
      0%,100% { transform: rotate(0deg);   }
      30%     { transform: rotate(1.8deg); }
      70%     { transform: rotate(-1.8deg);}
    }

    /* ── Grass sway ── */
    .gbl { transform-box:fill-box; transform-origin:50% 100%; }
    .ga  { animation: gsway 3.2s ease-in-out infinite; }
    .gb  { animation: gsway 2.7s ease-in-out infinite; animation-delay:.6s; }
    .gc  { animation: gsway 3.8s ease-in-out infinite; animation-delay:1.1s; }
    .gd  { animation: gsway 2.5s ease-in-out infinite; animation-delay:.3s; }
    @keyframes gsway {
      0%,100% { transform: rotate(0deg);   }
      50%     { transform: rotate(12deg);  }
    }

    /* ── Butterfly ── */
    .bf     { animation: bfpath 20s linear infinite; }
    .bfw-l  { transform-box:fill-box; transform-origin:right center;  animation:bfl .25s ease-in-out infinite alternate; }
    .bfw-r  { transform-box:fill-box; transform-origin:left center;   animation:bfr .25s ease-in-out infinite alternate; }
    @keyframes bfl { to { transform:scaleX(.15) skewY(-25deg); } }
    @keyframes bfr { to { transform:scaleX(.15) skewY(25deg);  } }
    @keyframes bfpath {
      0%  { transform:translate(120px,75px); }
      20% { transform:translate(220px,52px); }
      40% { transform:translate(320px,80px); }
      60% { transform:translate(240px,58px); }
      80% { transform:translate(150px,70px); }
      100%{ transform:translate(120px,75px); }
    }

    /* ══ GOOSE — HTML element, positioned over field ══ */
    .goose-stage {
      position: absolute;
      /* 4% puts the goose shadow on the front ground strip */
      bottom: 4%;
      left: 0;
      width: 100%;
      height: 0;
      pointer-events: none;
      z-index: 5;
    }

    /* Walker handles horizontal movement + direction flip */
    .goose-walker {
      position: absolute;
      bottom: 0;
      left: 0;
      width: 110px;
      transform-origin: center bottom;
      animation: gwalk 14s ease-in-out infinite;
    }
    @keyframes gwalk {
      0%       { left:5%;   transform:scaleX(-1); }
      25%      { left:55%;  transform:scaleX(-1); }
      33%      { left:55%;  transform:scaleX( 1); }   /* turn around */
      58%      { left:6%;   transform:scaleX( 1); }
      65%      { left:6%;   transform:scaleX(-1); }   /* turn */
      70%      { left:28%;  transform:scaleX(-1); }   /* walk to middle */
      74%      { left:28%;  transform:scaleX( 1); }   /* confused turn */
      80%      { left:28%;  transform:scaleX( 1); }   /* pause */
      86%      { left:28%;  transform:scaleX(-1); }
      100%     { left:5%;   transform:scaleX(-1); }
    }

    /* Bobber handles vertical hop (nested so it doesn't affect X) */
    .goose-bobber {
      animation: gbob .5s ease-in-out infinite alternate;
      position: relative;
    }
    @keyframes gbob { to { transform: translateY(-9px); } }

    /* Speech bubble — counter-flip via scaleX(-1) inherited from parent */
    .goose-bubble {
      position: absolute;
      bottom: calc(100% + 8px);
      left: 50%;
      transform: translateX(-50%) scaleX(var(--flip,1));
      background: white;
      border: 2px solid #ddd;
      border-radius: 14px;
      padding: 5px 12px;
      font-size: 13px;
      font-weight: 800;
      color: #2D2D2D;
      white-space: nowrap;
      animation: bpop 14s ease-in-out infinite;
      opacity: 0;
    }
    .goose-bubble::after {
      content:'';
      position:absolute;
      bottom:-10px; left:50%;
      transform:translateX(-50%);
      border:5px solid transparent;
      border-top-color:white;
    }
    @keyframes bpop {
      0%,35%   { opacity:0; transform:translateX(-50%) scale(.6); }
      40%      { opacity:1; transform:translateX(-50%) scale(1.1); }
      46%,56%  { opacity:1; transform:translateX(-50%) scale(1);   }
      63%      { opacity:0; transform:translateX(-50%) scale(.7);  }
      100%     { opacity:0; }
    }

    /* Question marks */
    .qm {
      position: absolute;
      bottom: calc(100% + 4px);
      font-size: 24px;
      font-weight: 900;
      color: #4e9938;
      opacity: 0;
      animation: qpop 14s ease-in-out infinite;
    }
    .qm.q1 { left:60%; animation-delay:0s; }
    .qm.q2 { left:20%; font-size:16px; animation-delay:.35s; }
    @keyframes qpop {
      0%,60%  { opacity:0; transform:translateY(0) scale(0); }
      65%     { opacity:1; transform:translateY(-12px) scale(1.1); }
      73%     { opacity:1; transform:translateY(-22px) scale(1);   }
      82%     { opacity:0; transform:translateY(-35px) scale(.6);  }
      100%    { opacity:0; }
    }

    /* Goose SVG */
    .goose-svg {
      display: block;
      width: 110px;
      height: auto;
    }
    /* Head tilt (confusion) */
    .g-head {
      transform-box: fill-box;
      transform-origin: 50% 90%;
      animation: gtilt 14s ease-in-out infinite;
    }
    @keyframes gtilt {
      0%,25%   { transform: rotate(0deg);   }
      30%,38%  { transform: rotate(-16deg); } /* look back when turning */
      44%      { transform: rotate(0deg);   }
      63%,70%  { transform: rotate(12deg);  } /* confused right tilt */
      74%,80%  { transform: rotate(-14deg); } /* confused left tilt */
      85%      { transform: rotate(8deg);   }
      90%,100% { transform: rotate(0deg);   }
    }
    /* Leg walk */
    .g-ll { transform-box:fill-box; transform-origin:50% 0; animation: gll .5s ease-in-out infinite alternate; }
    .g-rl { transform-box:fill-box; transform-origin:50% 0; animation: grl .5s ease-in-out infinite alternate; }
    @keyframes gll { to { transform: rotate( 20deg); } }
    @keyframes grl { to { transform: rotate(-20deg); } }
  </style>
</head>
<body>

  <!-- Text -->
  <div class="text-area">
    <div class="err-code">4<span>0</span>4</div>
    <h1>Honk! This page got lost in the field.</h1>
    <p class="sub">Our field goose went looking for it — came back confused.<br>It doesn't exist, or it moved somewhere else.</p>
    <a href="/" class="btn-home">← Back to the Portal</a>
  </div>

  <!-- Field scene -->
  <div class="field-wrapper">

    <!-- Static SVG background (no goose here) -->
    <svg class="bg" xmlns="http://www.w3.org/2000/svg" viewBox="0 0 900 300" preserveAspectRatio="xMidYMax meet">
      <defs>
        <linearGradient id="sky" x1="0" y1="0" x2="0" y2="1">
          <stop offset="0%" stop-color="#b8dff8"/>
          <stop offset="100%" stop-color="#dceefa"/>
        </linearGradient>
        <linearGradient id="h1g" x1="0" y1="0" x2="0" y2="1">
          <stop offset="0%" stop-color="#72c042"/>
          <stop offset="100%" stop-color="#4a9228"/>
        </linearGradient>
        <linearGradient id="h2g" x1="0" y1="0" x2="0" y2="1">
          <stop offset="0%" stop-color="#5aab34"/>
          <stop offset="100%" stop-color="#3a8020"/>
        </linearGradient>
        <linearGradient id="gnd" x1="0" y1="0" x2="0" y2="1">
          <stop offset="0%" stop-color="#4a9228"/>
          <stop offset="100%" stop-color="#3a7820"/>
        </linearGradient>
      </defs>

      <!-- Sky -->
      <rect width="900" height="300" fill="url(#sky)"/>

      <!-- Sun -->
      <circle cx="800" cy="55" r="42" fill="#FFE066" opacity=".85"/>
      <circle cx="800" cy="55" r="33" fill="#FFD000" opacity=".9"/>
      <!-- Sun rays -->
      <g stroke="#FFE066" stroke-width="3" opacity=".5">
        <line x1="800" y1="4"  x2="800" y2="14"/>
        <line x1="800" y1="96" x2="800" y2="106"/>
        <line x1="749" y1="55" x2="759" y2="55"/>
        <line x1="841" y1="55" x2="851" y2="55"/>
        <line x1="764" y1="19" x2="771" y2="26"/>
        <line x1="829" y1="84" x2="836" y2="91"/>
        <line x1="836" y1="19" x2="829" y2="26"/>
        <line x1="764" y1="84" x2="771" y2="77"/>
      </g>

      <!-- Clouds -->
      <g class="c1">
        <ellipse cx="160" cy="62" rx="58" ry="26" fill="white" opacity=".9"/>
        <ellipse cx="202" cy="53" rx="42" ry="23" fill="white" opacity=".9"/>
        <ellipse cx="124" cy="68" rx="34" ry="19" fill="white" opacity=".9"/>
      </g>
      <g class="c2">
        <ellipse cx="540" cy="45" rx="66" ry="28" fill="white" opacity=".82"/>
        <ellipse cx="590" cy="36" rx="46" ry="24" fill="white" opacity=".82"/>
        <ellipse cx="498" cy="52" rx="38" ry="20" fill="white" opacity=".82"/>
      </g>

      <!-- Back hill -->
      <path d="M0 200 Q100 165 250 188 Q420 208 570 172 Q720 142 900 182 L900 300 L0 300 Z" fill="url(#h1g)"/>
      <!-- Front hill -->
      <path d="M0 232 Q160 208 330 226 Q500 244 650 218 Q790 202 900 230 L900 300 L0 300 Z" fill="url(#h2g)"/>
      <!-- Ground strip -->
      <rect x="0" y="268" width="900" height="32" fill="url(#gnd)"/>
      <path d="M0 268 Q225 258 450 265 Q675 271 900 260 L900 274 Q675 283 450 278 Q225 284 0 276 Z" fill="#4a9228"/>

      <!-- Grass blades -->
      <g fill="#358018">
        <path class="gbl ga" d="M40 268 L44 248 L48 268"/>
        <path class="gbl gb" d="M85 270 L88 252 L91 270"/>
        <path class="gbl gc" d="M140 266 L145 246 L150 266"/>
        <path class="gbl gd" d="M215 269 L218 251 L221 269"/>
        <path class="gbl ga" d="M290 267 L294 247 L298 267"/>
        <path class="gbl gb" d="M375 270 L379 250 L383 270"/>
        <path class="gbl gc" d="M460 268 L464 247 L468 268"/>
        <path class="gbl gd" d="M550 266 L554 246 L558 266"/>
        <path class="gbl ga" d="M635 269 L639 249 L643 269"/>
        <path class="gbl gb" d="M720 268 L724 247 L728 268"/>
        <path class="gbl gc" d="M800 267 L804 247 L808 267"/>
        <path class="gbl gd" d="M862 270 L866 250 L870 270"/>
      </g>

      <!-- Flowers / daisies -->
      <g>
        <circle cx="62"  cy="268" r="4.5" fill="white"/><circle cx="62"  cy="268" r="2.2" fill="#FFD700"/>
        <circle cx="250" cy="266" r="4"   fill="white"/><circle cx="250" cy="266" r="2"   fill="#FFD700"/>
        <circle cx="500" cy="268" r="3.5" fill="white"/><circle cx="500" cy="268" r="1.8" fill="#FFD700"/>
        <circle cx="700" cy="267" r="4.5" fill="white"/><circle cx="700" cy="267" r="2.2" fill="#FFD700"/>
        <circle cx="840" cy="269" r="3"   fill="#FFB6C1"/><circle cx="840" cy="269" r="1.5" fill="#FFD700"/>
        <circle cx="170" cy="267" r="2.5" fill="#c8f0a0"/>
        <circle cx="600" cy="266" r="2.5" fill="#c8f0a0"/>
      </g>

      <!-- 404 Wooden sign -->
      <g class="sign" transform="translate(650,195)">
        <rect x="-5" y="0" width="10" height="75" rx="4" fill="#8B6332"/>
        <rect x="-56" y="-78" width="112" height="80" rx="7" fill="#c8a460"/>
        <rect x="-56" y="-78" width="112" height="80" rx="7" stroke="#8B6332" stroke-width="2.5" fill="none"/>
        <line x1="-44" y1="-62" x2="44" y2="-62" stroke="#b89448" stroke-width=".9" opacity=".6"/>
        <line x1="-44" y1="-50" x2="44" y2="-50" stroke="#b89448" stroke-width=".9" opacity=".6"/>
        <text x="0" y="-36" text-anchor="middle" font-family="'Segoe UI',Arial,sans-serif" font-weight="900" font-size="32" fill="#2D2D2D">404</text>
        <text x="0" y="-20" text-anchor="middle" font-family="'Segoe UI',Arial,sans-serif" font-weight="700" font-size="11" fill="#5a3e0a">YOU ARE HERE</text>
        <text x="0" y="-7"  text-anchor="middle" font-family="'Segoe UI',Arial,sans-serif" font-size="12" fill="#8a6028">↕ (maybe)</text>
        <path d="M-6 75 L-6 88 L-13 88 L0 102 L13 88 L6 88 L6 75 Z" fill="#8B6332"/>
      </g>

      <!-- Butterfly -->
      <g class="bf">
        <g class="bfw-l"><path d="M-14,0 Q-24,-14 -10,-18 Q-2,-13 0,0 Z" fill="#FF8C69" opacity=".85"/></g>
        <g class="bfw-r"><path d="M14,0 Q24,-14 10,-18 Q2,-13 0,0 Z"  fill="#FF8C69" opacity=".85"/></g>
        <ellipse cx="0" cy="0" rx="2.5" ry="7" fill="#4a2800"/>
      </g>
    </svg>

    <!-- ══ GOOSE on top of field (HTML element) ══ -->
    <div class="goose-stage">
      <div class="goose-walker">
        <div class="goose-bobber">

          <!-- Speech bubble ("HONK?") — stays readable because it lives in a separate stacking context -->
          <div class="goose-bubble">HONK?</div>

          <!-- Question marks -->
          <div class="qm q1">?</div>
          <div class="qm q2">?</div>

          <!-- The goose SVG itself -->
          <!-- viewBox expands to show head (y=-20) through feet tip (y=145) -->
          <svg class="goose-svg" xmlns="http://www.w3.org/2000/svg" viewBox="-5 -20 120 165">

            <!-- Shadow -->
            <ellipse cx="54" cy="140" rx="40" ry="5" fill="rgba(0,0,0,0.12)"/>

            <!-- BODY — flat design plump oval -->
            <ellipse cx="62" cy="95" rx="44" ry="30" fill="#dde8e3"/>
            <!-- Wing shadow (lower body) -->
            <ellipse cx="52" cy="100" rx="30" ry="20" fill="#c6d8d1" transform="rotate(-8 52 100)"/>
            <!-- Wing highlight (upper front) -->
            <ellipse cx="72" cy="86" rx="32" ry="18" fill="#e8f2ee" transform="rotate(-12 72 86)"/>

            <!-- TAIL — dark slate (right end, goose faces left) -->
            <path d="M97 79 Q112 66 108 84 Q105 98 96 103 Z" fill="#546e7a"/>
            <path d="M95 84 Q107 74 103 90 Q100 100 94 104 Z" fill="#607d8b"/>

            <!-- NECK — S-curve, flat-design two-tone -->
            <path d="M44 66 Q24 50 28 30 Q32 14 34 6"
                  stroke="#c8dbd5" stroke-width="22" fill="none" stroke-linecap="round"/>
            <path d="M44 66 Q24 50 28 30 Q32 14 34 6"
                  stroke="#eef4f1" stroke-width="17" fill="none" stroke-linecap="round"/>

            <!-- HEAD group (animated for confusion) -->
            <g class="g-head">
              <ellipse cx="34" cy="2" rx="15" ry="12" fill="#edf4f0"/>
              <!-- Eye -->
              <circle cx="27" cy="-1" r="4.5" fill="#3d2b1f"/>
              <circle cx="26" cy="-2" r="1.7" fill="white" opacity=".7"/>
              <!-- Beak — flat orange bill, pointing left -->
              <path d="M22 5 L5 3 L5 10 L22 9 Z" fill="#FFA726"/>
              <line x1="5" y1="6.5" x2="22" y2="6.5" stroke="#e89020" stroke-width=".8"/>
              <ellipse cx="11" cy="6" rx="2.5" ry="1.5" fill="#e08014" opacity=".5"/>
            </g>

            <!-- LEGS & FEET — flat orange -->
            <g class="g-ll">
              <path d="M47 122 L40 137" stroke="#FFA726" stroke-width="5.5" stroke-linecap="round"/>
              <path d="M40 137 L27 135 M40 137 L35 143 M40 137 L42 141"
                    stroke="#FFA726" stroke-width="3" fill="none" stroke-linecap="round" stroke-linejoin="round"/>
            </g>
            <g class="g-rl">
              <path d="M65 124 L72 139" stroke="#FFA726" stroke-width="5.5" stroke-linecap="round"/>
              <path d="M72 139 L59 137 M72 139 L67 144 M72 139 L74 143"
                    stroke="#FFA726" stroke-width="3" fill="none" stroke-linecap="round" stroke-linejoin="round"/>
            </g>

          </svg>
        </div><!-- /bobber -->
      </div><!-- /walker -->
    </div><!-- /goose-stage -->

  </div><!-- /field-wrapper -->

</body>
</html>
